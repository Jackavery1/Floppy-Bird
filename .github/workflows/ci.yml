name: CI

on:
    pull_request:
        branches: [main]
    push:
        branches: [main]
    workflow_dispatch:

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: npm
            - run: npm ci
            - run: npm run icons
            - run: npm run icons:optimize
            - run: npm run lint
            - run: npm run cycles
            - run: npm run format:check
            - run: npm test
            - run: npm run test:coverage
            - uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: coverage-report
                  path: coverage/
                  retention-days: 14

    e2e-smoke:
        needs: check
        runs-on: ubuntu-latest
        timeout-minutes: 15
        strategy:
            fail-fast: false
            matrix:
                project:
                    - chromium-desktop
                    - chromium-mobile-portrait
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: npm
            - run: npm ci
            - run: npm run icons
            - run: npm run icons:optimize
            - run: npx playwright install chromium
            - run: npm run build
              env:
                  BASE_PATH: /Floppy-Bird/
                  VITE_ENABLE_TEST_SEAM: 'true'
            - run: npx playwright test --workers=1 --project=${{ matrix.project }} e2e/loading.spec.js e2e/offline.spec.js e2e/viewport-pwa.spec.js e2e/viewport.spec.js e2e/touchTargets.spec.js e2e/keyboard.spec.js e2e/gameplay-equity.spec.mjs e2e/visual-regression.spec.js e2e/visual-font.spec.js
              env:
                  BASE_PATH: /Floppy-Bird/
                  PLAYWRIGHT_SKIP_BUILD: '1'

    e2e:
        needs: check
        runs-on: ubuntu-latest
        timeout-minutes: 35
        strategy:
            fail-fast: false
            matrix:
                project:
                    - chromium-desktop
                    - chromium-mobile-portrait
                    - chromium-mobile-landscape
                    - webkit-mobile-portrait
                    - webkit-mobile-landscape
                    - chromium-tablet-landscape
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: npm
            - run: npm ci
            - run: npm run icons
            - run: npm run icons:optimize
            - run: npx playwright install chromium webkit
            - run: npm run build
              env:
                  BASE_PATH: /Floppy-Bird/
                  VITE_ENABLE_TEST_SEAM: 'true'
            - run: npx playwright test --workers=1 --project=${{ matrix.project }}
              env:
                  BASE_PATH: /Floppy-Bird/
                  PLAYWRIGHT_SKIP_BUILD: '1'

    lighthouse:
        needs: check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: npm
            - run: npm ci
            - run: npm run icons
            - run: npm run icons:optimize
            - run: npm run build
            - run: npm run lighthouse

    deploy:
        needs: [check, lighthouse, e2e-smoke]
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
        runs-on: ubuntu-latest
        permissions:
            contents: write
        concurrency:
            group: pages
            cancel-in-progress: false
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: npm
            - run: npm ci
            - run: npm run icons
            - run: npm run icons:optimize
            - run: npm run build
              env:
                  BASE_PATH: /Floppy-Bird/
            - uses: peaceiris/actions-gh-pages@v4
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  publish_dir: ./dist
                  publish_branch: gh-pages
                  force_orphan: true
