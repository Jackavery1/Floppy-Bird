name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run icons
      - run: npm run lint
      - run: npm test
      - run: npm run build
        env:
          BASE_PATH: /Floppy-Bird/
      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: main
          target-folder: docs
          clean: true
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "deploy: ${{ github.sha }}"
