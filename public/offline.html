<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes, viewport-fit=cover, interactive-widget=resizes-content"
        />
        <meta name="color-scheme" content="dark" />
        <meta name="theme-color" content="#1a1a2e" />
        <title>Floppy bird</title>
        <style>
            :root {
                --couleur-fond: #1a1a2e;
                --couleur-texte-chargement: #90caf9;
                --couleur-accent: #fdd835;
                --police-interface: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family: var(--police-interface);
                background: var(--couleur-fond);
                color: var(--couleur-texte-chargement);
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100dvh;
                text-align: center;
                padding: max(24px, env(safe-area-inset-top)) max(24px, env(safe-area-inset-right))
                    max(24px, env(safe-area-inset-bottom)) max(24px, env(safe-area-inset-left));
            }
            h1 {
                color: var(--couleur-accent);
                font-size: 1.5rem;
                margin-bottom: 0.75rem;
            }
            p {
                line-height: 1.5;
                margin-bottom: 0.75rem;
            }
            a {
                color: #ffe066;
                font-weight: bold;
            }
            a:focus-visible {
                outline: 2px solid var(--couleur-accent);
                outline-offset: 2px;
            }
        </style>
    </head>
    <body>
        <main>
            <h1>Hors ligne</h1>
            <p>Le jeu n'est pas encore en cache. Ouvre-le une fois en ligne, puis réessaie.</p>
            <p><a href="./">Retour au jeu</a></p>
        </main>
    </body>
</html>
