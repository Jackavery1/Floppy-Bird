<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes, viewport-fit=cover, interactive-widget=resizes-content"
        />
        <meta name="color-scheme" content="dark" />
        <meta name="theme-color" content="#1a1a2e" />
        <title>Floppy bird</title>
        <link rel="stylesheet" href="shell-tokens.css" />
        <link rel="stylesheet" href="offline-page.css" />
        <style>
            @font-face {
                font-family: 'Press Start 2P';
                font-style: normal;
                font-display: swap;
                font-weight: 400;
                src: url('fonts/press-start-2p-latin-400-normal.woff2') format('woff2');
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                background: var(--couleur-fond);
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100dvh;
                padding: max(24px, env(safe-area-inset-top)) max(24px, env(safe-area-inset-right))
                    max(24px, env(safe-area-inset-bottom)) max(24px, env(safe-area-inset-left));
            }
        </style>
    </head>
    <body class="offline-shell">
        <main>
            <h1>Hors ligne</h1>
            <p>Le jeu n'est pas encore en cache. Ouvre-le une fois en ligne, puis réessaie.</p>
            <p><a href="./">Retour au jeu</a></p>
        </main>
    </body>
</html>
