<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta
      name="description"
      content="Floppy Bird — arcade 2D, scores locaux, mode hors-ligne."
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Floppy Bird" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <title>Floppy Bird</title>
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="icons/favicon-32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="icons/icon-192.png"
    />
    <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="loading" aria-live="polite">Chargement…</div>
    <div id="landscape-hint" role="status">Tourne ton téléphone en portrait pour jouer</div>
    <div id="game-container"></div>
    <script type="module" src="/src/main.js"></script>
    <script>
      setTimeout(function () {
        var el = document.getElementById('loading');
        if (el && !el.classList.contains('hidden')) {
          el.innerHTML =
            'Impossible de charger le jeu.<br><br>' +
            'Utilise <strong>npm run dev</strong> (Vite), pas Live Server.<br>' +
            'Live Server ne peut pas résoudre les modules npm (Phaser).';
        }
      }, 6000);
    </script>
  </body>
</html>
